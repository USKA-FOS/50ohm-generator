  <div class="row flex-lg-row align-items-top g-5 py-1">
    <div class="col-lg-10">
      <h1>Übersicht der Änderungen</h1>
        <div id="meta">Loading…</div>
        <pre id="output"></pre>

        <script src="https://cdn.jsdelivr.net/npm/diff/dist/diff.min.js"></script>
        <script>
          const BASE_A = "/50ohm-diff-worktrees/main/contents/sections/";
          const BASE_B = "/50ohm-diff-worktrees/review/contents/sections/";

          const params   = new URLSearchParams(window.location.search);
          const filename = params.get("file");

          const meta   = document.getElementById("meta");
          const output = document.getElementById("output");

          if (!filename) {
            meta.textContent = 'No file specified. Add ?file=<filename> to the URL.';
          } else {
            meta.textContent = '';

            Promise.all([
              fetch(BASE_A + filename).then(r => {
                if (!r.ok) throw new Error(`${BASE_A}${filename} — HTTP ${r.status}`);
                return r.text();
              }),
              fetch(BASE_B + filename).then(r => {
                if (!r.ok) throw new Error(`${BASE_B}${filename} — HTTP ${r.status}`);
                return r.text();
              }),
            ])
            .then(([textA, textB]) => {
              const changes = Diff.diffWords(textA, textB);
              output.innerHTML = "";

              changes.forEach(part => {
                const span = document.createElement("span");
                if (part.added)   span.className = "diff added";
                if (part.removed) span.className = "diff removed";
                span.textContent = part.value;
                output.appendChild(span);
              });
            })
            .catch(err => {
              meta.textContent = "Error: " + err.message;
            });
          }
        </script>
    </div>
  </div>
